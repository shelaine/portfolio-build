<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#9BD0B2" />

    <!-- Primary SEO -->
    <title>Shelaine Roustio</title>
    <meta name="description" content="Portfolio of Shelaine Roustio, Front-end Developer specializing in WordPress and React." />

    <!-- Open Graph (controls Google image + description, also Facebook/LinkedIn) -->
    <meta property="og:title" content="Shelaine Roustio — Front-end Developer" />
    <meta property="og:description" content="Portfolio of Shelaine Roustio, Front-end Developer specializing in WordPress and React." />
    <meta property="og:image" content="https://shelaine.net/thumbnail.png" />
    <meta property="og:url" content="https://shelaine.net" />
    <meta property="og:type" content="website" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shelaine Roustio — Front-end Developer" />
    <meta name="twitter:description" content="Portfolio of Shelaine Roustio, Front-end Developer specializing in WordPress and React." />
    <meta name="twitter:image" content="https://shelaine.net/thumbnail.png" />

  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
      <filter id="card-distort">
        <feTurbulence
          type="turbulence"
          baseFrequency="0.02"
          numOctaves="3"
          seed="2"
          result="noise"
        />
        <feDisplacementMap
          in="SourceGraphic"
          in2="noise"
          scale="0"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>

  </body>
</html>
